name: Release VSIX

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read package version
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${current_version}" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when release already exists
        if: steps.release_exists.outputs.exists == 'true'
        run: echo "Release for ${{ steps.version.outputs.tag }} already exists, skipping."

      - name: Install dependencies
        if: steps.release_exists.outputs.exists != 'true'
        run: npm ci

      - name: Build extension
        if: steps.release_exists.outputs.exists != 'true'
        run: npm run compile

      - name: Package VSIX
        if: steps.release_exists.outputs.exists != 'true'
        run: npm run package

      - name: Create GitHub Release
        if: steps.release_exists.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="release/Markdown AI Translate By junes-${{ steps.version.outputs.current_version }}.vsix"
          gh release create "${{ steps.version.outputs.tag }}" "$asset" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
